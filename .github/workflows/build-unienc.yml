name: Build unienc
on:
  workflow_dispatch:
    inputs:
      build-config:
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release

env:
  _RUST_BUILD_CONFIG: ${{ inputs.build-config == 'debug' && 'debug' || 'release' }}

jobs:
  build-windows:
    name: Build unienc (Windows, ${{ matrix.variant }})
    runs-on: windows-2022
    strategy:
      matrix:
        variant: [unity, nuget]
        arch: [x86_64]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: InstantReplay.Externals/unienc/crates/unienc_c
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: rustup default stable
      - run: rustup target add ${{ matrix.arch }}-pc-windows-msvc
      - run: cargo build --target ${{ matrix.arch }}-pc-windows-msvc --profile ${{ env._RUST_BUILD_CONFIG == 'debug' && 'dev' || env._RUST_BUILD_CONFIG }} ${{ matrix.variant == 'unity' && '-F mimalloc' || '' }}
      - run: Move-Item -Path unienc_c.dll -Destination libunienc_c.dll -Force
        working-directory: InstantReplay.Externals/unienc/target/${{ matrix.arch }}-pc-windows-msvc/${{ env._RUST_BUILD_CONFIG }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.arch }}-pc-windows
          path: |
            InstantReplay.Externals/unienc/target/${{ matrix.arch }}-pc-windows-msvc/${{ env._RUST_BUILD_CONFIG }}/libunienc_c.dll
            InstantReplay.Externals/unienc/target/${{ matrix.arch }}-pc-windows-msvc/${{ env._RUST_BUILD_CONFIG }}/unienc_c.pdb
          retention-days: 1
  build-android:
    name: Build unienc (Android ${{ matrix.triple }}, ${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [unity, nuget]
        triple: [aarch64-linux-android, x86_64-linux-android]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: InstantReplay.Externals/unienc/crates/unienc_c
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: rustup default stable
      - run: rustup target add ${{ matrix.triple }}
      - run: sudo apt update && sudo apt install gcc-multilib
      - run: echo "ANDROID_NDK_HOME=$(echo $ANDROID_NDK_LATEST_HOME)" >> $GITHUB_ENV
      - run: cargo install cargo-ndk
      - run: cargo ndk -t ${{ matrix.triple }} --platform 26 build --profile ${{ env._RUST_BUILD_CONFIG == 'debug' && 'dev' || env._RUST_BUILD_CONFIG }} ${{ matrix.variant == 'unity' && '-F unity,mimalloc' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.triple }}
          path: InstantReplay.Externals/unienc/target/${{ matrix.triple }}/${{ env._RUST_BUILD_CONFIG }}/libunienc_c.so
          retention-days: 1
  build-macos:
    name: Build unienc (macOS ${{ matrix.arch }}, ${{ matrix.variant }})
    runs-on: macos-15
    strategy:
      matrix:
        variant: [unity, nuget]
        arch: [aarch64, x86_64]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: InstantReplay.Externals/unienc/crates/unienc_c
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: rustup default stable
      - run: rustup target add ${{ matrix.arch }}-apple-darwin
      - run: cargo build --target ${{ matrix.arch }}-apple-darwin --profile ${{ env._RUST_BUILD_CONFIG == 'debug' && 'dev' || env._RUST_BUILD_CONFIG }} ${{ matrix.variant == 'unity' && '-F unity,mimalloc' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.arch }}-apple-darwin
          path: InstantReplay.Externals/unienc/target/${{ matrix.arch }}-apple-darwin/${{ env._RUST_BUILD_CONFIG }}/libunienc_c.dylib
          retention-days: 1
  lipo-macos:
    name: Create unienc macOS bundle (Unity)
    runs-on: macos-15
    needs: [build-macos]
    timeout-minutes: 30
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: 'unity-*-apple-darwin'
      - run: |
          lipo -create -output libunienc_c.bundle \
          unity-aarch64-apple-darwin/libunienc_c.dylib \
          unity-x86_64-apple-darwin/libunienc_c.dylib
        working-directory: artifacts
      - uses: actions/upload-artifact@v4
        with:
          name: unity-apple-darwin
          path: artifacts/libunienc_c.bundle
          retention-days: 1
  build-ios:
    name: Build unienc (iOS ${{ matrix.arch }}, ${{ matrix.variant }})
    runs-on: macos-15
    strategy:
      matrix:
        variant: [unity, nuget]
        arch: [aarch64]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: InstantReplay.Externals/unienc/crates/unienc_c
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: rustup default stable
      - run: rustup target add ${{ matrix.arch }}-apple-ios
      - run: cargo build --target ${{ matrix.arch }}-apple-ios --profile ${{ env._RUST_BUILD_CONFIG == 'debug' && 'dev' || env._RUST_BUILD_CONFIG }} ${{ matrix.variant == 'unity' && '-F unity,mimalloc' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.arch }}-apple-ios
          path: InstantReplay.Externals/unienc/target/${{ matrix.arch }}-apple-ios/${{ env._RUST_BUILD_CONFIG }}/libunienc_c.a
          retention-days: 1
  build-linux:
    name: Build unienc (Linux, ${{ matrix.variant }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        variant: [unity, nuget]
        arch: [x86_64]
    timeout-minutes: 30
    defaults:
      run:
        working-directory: InstantReplay.Externals/unienc/crates/unienc_c
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: rustup default stable
      - run: rustup target add ${{ matrix.arch }}-unknown-linux-gnu
      - run: sudo apt update && sudo apt install gcc-multilib
      - run: cargo build --target ${{ matrix.arch }}-unknown-linux-gnu --profile ${{ env._RUST_BUILD_CONFIG == 'debug' && 'dev' || env._RUST_BUILD_CONFIG }} ${{ matrix.variant == 'unity' && '-F mimalloc' || '' }}
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.variant }}-${{ matrix.arch }}-unknown-linux
          path: InstantReplay.Externals/unienc/target/${{ matrix.arch }}-unknown-linux-gnu/${{ env._RUST_BUILD_CONFIG }}/libunienc_c.so
          retention-days: 1
  build-wasm:
    name: Build unienc (WebAssembly, Unity)
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        working-directory: InstantReplay.Externals/unienc
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: rustup default stable
      - run: rustup target add wasm32-unknown-emscripten
      - run: rustup component add rust-src --toolchain nightly
      - name: Build unienc
        run: RUSTFLAGS=-Ctarget-cpu=mvp cargo +nightly rustc -Z json-target-spec -Z build-std=panic_abort,std --target wasm32-unknown-emscripten --profile ${{ env._RUST_BUILD_CONFIG == 'debug' && 'dev' || env._RUST_BUILD_CONFIG }}-wasm --no-default-features --crate-type staticlib -p unienc_c
      - uses: actions/upload-artifact@v4
        with:
          name: unity-wasm32-unknown-emscripten
          path: InstantReplay.Externals/unienc/target/wasm32-unknown-emscripten/${{ env._RUST_BUILD_CONFIG }}-wasm/libunienc_c.a
          retention-days: 1
  update-tpn:
    name: Update third-party notices
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: 'recursive'
      - run: |
          cargo install cargo-about --locked
          cargo about generate about.hbs > ../../THIRD-PARTY-NOTICES.md
        working-directory: InstantReplay.Externals/unienc
      - uses: actions/upload-artifact@v4
        with:
          name: ~third-party-notices
          path: ./THIRD-PARTY-NOTICES.md
  update-natives:
    name: Push unienc native libraries
    needs: [build-wasm, build-windows, build-android, build-ios, build-macos, build-linux, lipo-macos, update-tpn]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: ~third-party-notices
      - uses: actions/download-artifact@v4
        with:
          pattern: 'unity-*'
          path: ./staging-unity
      - uses: actions/download-artifact@v4
        with:
          pattern: 'nuget-*'
          path: ./staging-nuget
      - name: Place Unity native libraries
        run: |
          set -euo pipefail
          dest="./Packages/jp.co.cyberagent.instant-replay/UniEnc/Plugins"
          mkdir -p "$dest"
          for d in ./staging-unity/unity-*; do
            target="$(basename "$d")"
            target="${target#unity-}"
            mkdir -p "$dest/$target"
            cp -R "$d"/. "$dest/$target/"
          done
      - name: Place NuGet native libraries
        run: |
          set -euo pipefail
          dest="./InstantReplay.Externals/src/UniEnc/Plugins"
          mkdir -p "$dest"
          for d in ./staging-nuget/nuget-*; do
            target="$(basename "$d")"
            target="${target#nuget-}"
            mkdir -p "$dest/$target"
            cp -R "$d"/. "$dest/$target/"
          done
      - run: |
          git add ./Packages/jp.co.cyberagent.instant-replay/UniEnc/Plugins
          git add ./InstantReplay.Externals/src/UniEnc/Plugins
          git add ./THIRD-PARTY-NOTICES.md
          git config --local user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git commit -m "Update unienc native binaries"
          git push origin ${{ github.ref_name }}

permissions:
  contents: write
